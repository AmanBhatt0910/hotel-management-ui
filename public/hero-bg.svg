<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fdf2f8"/>
      <stop offset="50%" stop-color="#fce7f3"/>
      <stop offset="100%" stop-color="#f3e8ff"/>
    </linearGradient>

    <!-- Mountain Gradient -->
    <linearGradient id="mountainGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d946ef" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0.15"/>
    </linearGradient>

    <!-- Glow -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>

  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bgGradient)" />

  <!-- Decorative Glow -->
  <circle cx="1500" cy="200" r="300" fill="url(#glow)" />
  <circle cx="400" cy="850" r="350" fill="url(#glow)" />

  <!-- Mountains -->
  <path d="M0 700 L250 500 L450 650 L650 480 L900 720 L1150 520 L1400 650 L1600 500 L1920 700 L1920 1080 L0 1080 Z"
        fill="url(#mountainGradient)" />

  <path d="M0 800 L200 650 L450 750 L700 620 L950 780 L1200 640 L1450 760 L1700 640 L1920 780 L1920 1080 L0 1080 Z"
        fill="#ec4899" opacity="0.08"/>

  <!-- Abstract Luxury Lines -->
  <path d="M0 300 Q400 200 800 300 T1600 300 T1920 300"
        stroke="#ec4899"
        stroke-width="3"
        fill="none"
        opacity="0.15"/>

  <path d="M0 400 Q500 320 1000 400 T1920 400"
        stroke="#d946ef"
        stroke-width="2"
        fill="none"
        opacity="0.12"/>

</svg>